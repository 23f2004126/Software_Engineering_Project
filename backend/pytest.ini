[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Show extra summary info
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Markers for test categorization
markers =
    unit: Unit tests (test individual functions)
    integration: Integration tests (test multiple components together)
    slow: Slow tests
    api: API endpoint tests

# Coverage options
# Run with: pytest --cov=app --cov-report=html
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
